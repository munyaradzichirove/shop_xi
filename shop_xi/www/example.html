<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Obsidian XI</title>
</head>
<body style="margin: 0; padding: 0; font-family: sans-serif; background-color: #f4f4f7; display: flex; align-items: center; justify-content: center; min-height: 100vh;">

    <div style="background: #ffffff; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center;">
        
        <h1 style="margin-bottom: 25px; font-size: 24px;">
            <span style="color: #000000;">Obsidian</span><span style="color: #000080;">XI</span>
        </h1>

        <form>
            <input type="email" placeholder="Email Address" style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
            <input type="password" placeholder="Password" style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
            
            <button type="submit" style="width: 100%; padding: 12px; background-color: #000000; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 20px;">
                Log In
            </button>
        </form>

        <div style="border-top: 1px solid #eee; padding-top: 20px;">
            <p style="color: #666; font-size: 14px; margin-bottom: 15px;">Or continue with</p>
            <button style="width: 100%; padding: 12px; background-color: #ffffff; color: #333; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center;">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google" style="width: 18px; margin-right: 10px;">
                Sign in with Google
            </button>
        </div>
    </div>

</body>
</html>
